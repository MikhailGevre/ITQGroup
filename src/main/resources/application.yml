spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:${DB_NAME}://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
feign:
  document-feign: "http://localhost:8080/api/v1/documents"

retryable:
  document-client:
    max-attempts: "3"
    delay: 1500

generator:
  document-create: 10

executors:
  min-thread: 5
  max-thread: 10
  queue-task: 25
  thread-name: "executors-worker"
  wait-for-task: true
  await-termination-seconds: 30

scheduled:
  submit:
    name: "SUBMIT-worker"
    cron: ""
    batch-size: 500
  approve:
    name: "APPROVE-worker"
    cron: ""
    batch-size: 500



